version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./python:/app
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: ./php
    container_name: php
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mariadb:10.11
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  python_api:
    build: ./python
    container_name: python_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: >
      sh -c "
        echo '🧹 Nettoyage au démarrage...' &&
        python /app/script/cleanup.py &&
        echo '🚀 Démarrage API...' &&
        uvicorn api:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - ./python:/app
      - ./app/Donnee_parametres:/app/Donnee_parametres
      - ./python/service/analysis_exports:/app/service/analysis_exports
    depends_on:
      - mysql

volumes:
  mysql_data: