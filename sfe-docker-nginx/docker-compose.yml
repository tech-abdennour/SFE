version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./python:/app
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: ./php
    container_name: php
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mariadb:10.11
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  python_api:
    build: ./python
    container_name: python_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./python:/app
      - ./python/Donnes_Parameters:/app/Donnes_Parameters
      - ./app/Donnee_parametres:/app/Donnee_parametres
      - ./python/service/analysis_exports:/app/service/analysis_exports

volumes:
  mysql_data: