version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./app:/var/www/html
    depends_on:
      - php
    networks:
      - sfe_net

  php:
    build: ./php
    container_name: php_fpm
    volumes:
      - ./app:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sfe_net

  db:
    image: mariadb:10.11
    container_name: mariadb_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sfe_db
      MYSQL_USER: sfe_user
      MYSQL_PASSWORD: sfe_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sfe_net

  # --- LE NOUVEAU SERVICE DEBIAN (Bien aligné à gauche) ---
  debian_worker:
    build: 
      context: .
      dockerfile: ./services_debian/Dockerfile
    container_name: debian_worker
    volumes:
      - ./backups:/var/backups
    networks:
      - sfe_net
    depends_on:
      - db
    restart: always

networks:
  sfe_net:

volumes:
  db_data:
